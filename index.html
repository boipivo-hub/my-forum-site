<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARIES RP FORUM</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-analytics-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3IcqqmojbVDiQaos8phPyWbzFCq0_TlM",
            authDomain: "aries-forum.firebaseapp.com",
            databaseURL: "https://aries-forum-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aries-forum",
            storageBucket: "aries-forum.firebasestorage.app",
            messagingSenderId: "614643963857",
            appId: "1:614643963857:web:01f1f941c72249ac6eb2f0",
            measurementId: "G-8YWLND4LR2"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Глобальные компоненты -->
    <div id="global-announcement" class="announcement-banner hidden">
        <div class="announcement-content" id="announcement-text"></div>
        <span class="close-announcement" onclick="document.getElementById('global-announcement').classList.add('hidden')">&times;</span>
    </div>

    <nav class="main-navbar">
        <div class="nav-logo">ARIES RP FORUM</div>
        <div class="nav-auth" id="auth-zone">
            <button onclick="AuthSystem.login()">Войти</button>
        </div>
    </nav>

    <div id="app">
        <main id="main-content">
            <div id="breadcrumb-nav"><a href="/">Aries RP</a> > <span id="current-section">Главная</span></div>
            <div id="forum-grid" class="forum-grid">
                <div id="loading-spinner" style="text-align: center; padding: 50px;"><h3>Загрузка системы Aries RP...</h3></div>
            </div>
        </main>
    </div>

    <!-- Подключаем логику -->
    <script src="db-schema.js"></script>
    <script src="engine.js"></script>
    <script src="ui-manager.js"></script>
    <script src="profile-core.js"></script>

    <!-- Инициализатор -->
    <script>
        (async function bootSystem() {
            try {
                console.log("ARIES RP: Starting...");
                // Если UIManagerFinal определен в ui-manager.js, запускаем его
                if (typeof UIManagerFinal !== 'undefined') await UIManagerFinal.boot();
                document.getElementById('loading-spinner').style.display = 'none';
            } catch (e) {
                console.error("Boot Error:", e);
                document.body.innerHTML = "<h1>Ошибка загрузки системы</h1>";
            }
        })();
    </script>
</body>
</html>
