 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARIES RP | Исполнительный Веб-Портал</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ВЕРХНИЙ ИНФО-БАР -->
    <div style="background:#07070a; padding:10px 40px; display:flex; justify-content:space-between; font-size:12px; border-bottom:1px solid #1c1c28;">
        <div>Текущая сессия: Эмуляция Ядра XenForo Active Node</div>
        <div style="cursor:pointer; color:var(--xf-red)" onclick="viewProfile('Qumestlies_Shawty')">Привет, Qumestlies_Shawty 👑</div>
    </div>

    <!-- ШАПКА -->
    <div class="xf-header">
        <img class="xf-logo" src="https://i.postimg.cc/mDCHYg8g/aries.png" alt="Logo">
        <h1 style="margin:10px 0 0; text-transform:uppercase; letter-spacing:2px;">Aries <span style="color:var(--xf-red)">Role Play</span></h1>
    </div>

    <!-- ОСНОВНАЯ СЕТКА -->
    <div class="xf-page-container">
        
        <!-- НАВИГАЦИЯ СЛЕНА -->
        <div class="xf-sidebar">
            <div class="xf-sidebar-block">
                <div class="xf-sidebar-title">Навигация</div>
                <a href="#" class="xf-node-row active" id="n-chat" onclick="switchNode('chat')">💬 Общий чат</a>
                <a href="#" class="xf-node-row" id="n-gos" onclick="switchNode('gos')">🏢 Гос. Организации</a>
                <a href="#" class="xf-node-row" id="n-ghetto" onclick="switchNode('ghetto')">🥷 Уличные группировки</a>
                <a href="#" class="xf-node-row" id="n-complaints" onclick="switchNode('complaints')">⚖️ Жалобы на адм.</a>
            </div>
            <button class="xf-btn" style="width:100%; padding:12px;" onclick="openAdminModal()">⚙️ Системная Админка</button>
        </div>

        <!-- КОНТЕНТ СПРАВА -->
        <div class="xf-main-content" id="xen-content-render">
            <!-- Сюда инжектится весь форум -->
        </div>

    </div>

    <!-- МОДAЛКА АДМИНКИ -->
    <div class="xf-overlay" id="modal-admin">
        <div class="xf-modal-window">
            <div style="background:#1c1c28; padding:15px; font-weight:bold; display:flex; justify-content:between;">
                <span>УПРАВЛЕНИЕ ХАРАКТЕРИСТИКАМИ АККАУНТОВ</span>
                <span style="cursor:pointer; margin-left:auto;" onclick="closeModal('modal-admin')">&times;</span>
            </div>
            <div style="padding:25px;">
                <label style="font-size:11px; color:#8f8f9f; display:block; margin-bottom:5px;">ЦЕЛЕВОЙ ПОЛЬЗОВАТЕЛЬ</label>
                <select class="xf-input" id="adm-user"></select>
                
                <label style="font-size:11px; color:#8f8f9f; display:block; margin-bottom:5px;">ГРУППА ДОСТУПА</label>
                <select class="xf-input" id="adm-group">
                    <option value="founder">Основатель (Neon Glow)</option>
                    <option value="ga">Главный Администратор</option>
                    <option value="admin">Администратор</option>
                    <option value="user">Игрок</option>
                </select>

                <label style="font-size:11px; color:#8f8f9f; display:block; margin-bottom:5px;">INSTAGRAM ВЕРИФИКАЦИЯ</label>
                <select class="xf-input" id="adm-ver">
                    <option value="yes">Выдать синий знак верификации</option>
                    <option value="no">Отозвать галочку</option>
                </select>

                <button class="xf-btn" style="width:100%; margin-top:10px;" onclick="saveAdminData()">Применить к базе данных</button>
            </div>
        </div>
    </div>

    <!-- КАРТОЧКА ПРОФИЛЯ -->
    <div class="xf-overlay" id="modal-profile">
        <div class="xf-modal-window" style="max-width:400px; text-align:center; padding:30px; position:relative;">
            <span style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px;" onclick="closeModal('modal-profile')">&times;</span>
            <img id="p-ava" style="width:110px; height:110px; object-fit:cover; border:2px solid var(--border-medium); margin-bottom:15px;">
            <h2 id="p-nick" style="margin:5px 0; font-size:22px;"></h2>
            <div id="p-banner"></div>
        </div>
    </div>

    <!-- ПОДКЛЮЧАЕМ ЛОГИЧЕСКИЙ ДВИЖОК -->
    <script src="engine.js"></script>
</body>
</html>
