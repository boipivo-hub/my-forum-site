<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARIES ROLE PLAY | Профессиональный Веб-Портал</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="xf-glows.css">
</head>
<body>

    <div style="background:#030305; padding:15px 40px; display:flex; justify-content:between; border-bottom:1px solid #1e1e30; align-items:center;">
        <div style="font-weight:800; font-size:18px; text-transform:uppercase; letter-spacing:1px;">
            Aries <span style="color:var(--brand-red)">Portal</span>
        </div>
        <div id="runtime-auth-zone"></div>
    </div>

    <div class="forum-layout">
        <div>
            <div class="sidebar-block" id="nodes-navigation-list">
                </div>
            <button class="btn-core" id="ui-adm-btn" style="width:100%; display:none; background:#111; border:1px solid #ff003c;" onclick="AdminPanel.open()">
                🛡️ Панель Управления
            </button>
        </div>

        <div class="content-area" id="render-forum-core"></div>
    </div>

    <div class="overlay" id="m-auth">
        <div class="modal-frame">
            <div style="background:#171728; padding:15px; font-weight:bold; display:flex; justify-content:space-between;">
                <span id="auth-title">Вход в систему</span>
                <span style="cursor:pointer;" onclick="AuthModule.close()">&times;</span>
            </div>
            <div style="padding:25px;">
                <button class="btn-core" style="width:100%; background:#fff; color:#111; margin-bottom:15px; display:flex; align-items:center; justify-content:center; gap:10px;" onclick="AuthModule.triggerGoogleLogin()">
                    <img src="https://i.postimg.cc/mDCHYg8g/aries.png" style="width:18px; border-radius:50%;"> Войти через Google Account
                </button>
                <div style="text-align:center; margin-bottom:15px; font-size:11px; color:#555;">ИЛИ С ПОМОЩЬЮ НИКНЕЙМА</div>
                
                <input class="input-field" id="f-user" placeholder="Игровой Ник (Name_Surname)">
                <input class="input-field" type="password" id="f-pass" placeholder="Пароль">
                <div id="auth-btn-container"></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="m-admin">
        <div class="modal-frame" style="max-width:550px;">
            <div style="background:#171728; padding:15px; font-weight:bold; display:flex; justify-content:space-between;">
                <span>УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ И МОДИФИКАЦИЯМИ</span>
                <span style="cursor:pointer;" onclick="AdminPanel.close()">&times;</span>
            </div>
            <div style="padding:25px;">
                <label style="font-size:11px; color:#666;">ВЫБЕРИТЕ ЮЗЕРА</label>
                <select class="input-field" id="adm-target-user"></select>
                
                <label style="font-size:11px; color:#666;">ЦВЕТ НИКА / СВЕЧЕНИЕ</label>
                <select class="input-field" id="adm-set-glow">
                    <option value="glow-user">Обычный (Игрок)</option>
                    <option value="glow-founder">Основатель (Neon Glow Red)</option>
                    <option value="glow-spec">Спец. Администратор (Orange Glow)</option>
                    <option value="glow-curator">Куратор (Cyan Glow)</option>
                    <option value="glow-admin">Администратор (Red)</option>
                    <option value="glow-leader">Лидер фракции (Green)</option>
                </select>

                <label style="font-size:11px; color:#666;">ОФИЦИАЛЬНЫЙ ТЕГ-БАННЕР</label>
                <select class="input-field" id="adm-set-badge">
                    <option value="badge-user">Пользователь</option>
                    <option value="badge-founder">Руководство / Создатель</option>
                    <option value="badge-spec">Спец. Администратор</option>
                    <option value="badge-curator">Куратор Форума</option>
                    <option value="badge-admin">Администрация</option>
                </select>

                <label style="font-size:11px; color:#666;">СТАТУС БЛОКИРОВКИ АККАУНТА</label>
                <select class="input-field" id="adm-set-ban">
                    <option value="no">Аккаунт активен</option>
                    <option value="yes">Заблокировать на форуме (BANNED)</option>
                </select>

                <button class="btn-core" style="width:100%;" onclick="AdminPanel.save()">Применить параметры</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="m-profile">
        <div class="modal-frame" style="max-width:400px; text-align:center; padding:30px;">
            <div style="text-align:right;"><span style="cursor:pointer; font-size:20px;" onclick="ProfileCore.close()">&times;</span></div>
            <div style="position:relative; width:110px; height:110px; margin:0 auto 15px;">
                <img id="my-profile-avatar-view" class="avatar-round" src="">
                <label for="file-avatar" style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.8); font-size:9px; padding:4px; cursor:pointer;">GIF / JPG</label>
                <input type="file" id="file-avatar" accept="image/*" style="display:none;" onchange="ProfileCore.upload(event)">
            </div>
            <h3 style="margin:5px 0;">Смена никнейма</h3>
            <input class="input-field" id="new-profile-nick" placeholder="Новый ник">
            <button class="btn-core" style="width:100%;" onclick="ProfileCore.saveData()">Обновить данные</button>
        </div>
    </div>

    <script src="auth-module.js"></script>
    <script src="forum-nodes.js"></script>
    <script src="profile-core.js"></script>
    <script src="admin-panel.js"></script>
    <script src="app.js"></script>
</body>
</html>
