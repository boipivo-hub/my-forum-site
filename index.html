<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aries Role Play — Панель Создателя</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-main: #06060c;
            --bg-card: #0c0c14;
            --border-color: #1c1c30;
            --accent: #ff0055;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: #dedee6;
        }
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: #fff; }
        .logo span { color: var(--accent); }
        
        .forum-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .sidebar { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; height: fit-content; }
        .sidebar-title { font-size: 12px; text-transform: uppercase; color: #555; letter-spacing: 1px; margin-bottom: 15px; font-weight: bold; }
        .nav-link { display: block; color: #aaa; text-decoration: none; padding: 10px 12px; border-radius: 4px; margin-bottom: 5px; font-size: 14px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: #141424; color: #fff; }
        .main-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 30px; min-height: 500px; }
        
        .post-row {
            display: grid;
            grid-template-columns: 190px 1fr;
            background: #08080d;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .post-author-zone {
            background: #0b0b12;
            padding: 20px;
            text-align: center;
            border-right: 1px solid var(--border-color);
        }
        .post-text-zone {
            padding: 25px;
            white-space: pre-wrap;
            color: #cdcdff;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn-core { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-core:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .input-field { width: 100%; background: #11111e; border: 1px solid var(--border-color); padding: 12px; border-radius: 4px; color: #fff; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; }
        
        .avatar-mini { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); cursor: pointer; }
        .avatar-round { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #1c1c30; }

        /* СТИЛИ ГАЛОЧЕК ИЗ СКРИНШОТА */
        .verified-badge {
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-left: 5px;
            vertical-align: middle;
            background-size: contain;
            background-repeat: no-repeat;
        }
        .v-blue-line { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350"><path fill="none" stroke="%232196F3" stroke-width="28" d="M175 18.5l34 16.6 28.5-24.6 21 31.4 36.6-7.3 11 36.3 37.8 11.2-1 38 33 26-13.4 35.5 23.3 35-24.5 28.5 10 36.7-32 27.5 5 37.7-36.4 11-17.5 33.7-36.4-7.5-27.5 26.3-31.5-21-34.7 15.3-31.5-21-27.4 26.3-36.4-7.5-17.5 33.7-36.4-11 5-37.7-32-27.5 10-36.7-24.5-28.5 23.3-35-13.5-35.5 33-26-1-38 37.8-11.2 11-36.3 36.6 7.3 21-31.4 28.5 24.6z"/><path fill="none" stroke="%232196F3" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" d="M120 180l40 40 80-80"/></svg>'); filter: drop-shadow(0 0 4px #2196f3); }
        .v-yellow-line { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350"><path fill="none" stroke="%23FFEB3B" stroke-width="28" d="M175 18.5l34 16.6 28.5-24.6 21 31.4 36.6-7.3 11 36.3 37.8 11.2-1 38 33 26-13.4 35.5 23.3 35-24.5 28.5 10 36.7-32 27.5 5 37.7-36.4 11-17.5 33.7-36.4-7.5-27.5 26.3-31.5-21-34.7 15.3-31.5-21-27.4 26.3-36.4-7.5-17.5 33.7-36.4-11 5-37.7-32-27.5 10-36.7-24.5-28.5 23.3-35-13.5-35.5 33-26-1-38 37.8-11.2 11-36.3 36.6 7.3 21-31.4 28.5 24.6z"/><path fill="none" stroke="%23FFEB3B" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" d="M120 180l40 40 80-80"/></svg>'); filter: drop-shadow(0 0 4px #ffeb3b); }
        .v-red-line { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350"><path fill="none" stroke="%23F44336" stroke-width="28" d="M175 18.5l34 16.6 28.5-24.6 21 31.4 36.6-7.3 11 36.3 37.8 11.2-1 38 33 26-13.4 35.5 23.3 35-24.5 28.5 10 36.7-32 27.5 5 37.7-36.4 11-17.5 33.7-36.4-7.5-27.5 26.3-31.5-21-34.7 15.3-31.5-21-27.4 26.3-36.4-7.5-17.5 33.7-36.4-11 5-37.7-32-27.5 10-36.7-24.5-28.5 23.3-35-13.5-35.5 33-26-1-38 37.8-11.2 11-36.3 36.6 7.3 21-31.4 28.5 24.6z"/><path fill="none" stroke="%23F44336" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" d="M120 180l40 40 80-80"/></svg>'); filter: drop-shadow(0 0 4px #f44336); }
        .v-blue-fill { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350"><path fill="%232196F3" d="M175 18.5l34 16.6 28.5-24.6 21 31.4 36.6-7.3 11 36.3 37.8 11.2-1 38 33 26-13.4 35.5 23.3 35-24.5 28.5 10 36.7-32 27.5 5 37.7-36.4 11-17.5 33.7-36.4-7.5-27.5 26.3-31.5-21-34.7 15.3-31.5-21-27.4 26.3-36.4-7.5-17.5 33.7-36.4-11 5-37.7-32-27.5 10-36.7-24.5-28.5 23.3-35-13.5-35.5 33-26-1-38 37.8-11.2 11-36.3 36.6 7.3 21-31.4 28.5 24.6z"/><path fill="none" stroke="%23FFFFFF" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" d="M120 180l40 40 80-80"/></svg>'); filter: drop-shadow(0 0 6px rgba(33,150,243,0.6)); width: 15px; height: 15px; }

        @keyframes rgb-burn {
            0% { color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.6); }
            33% { color: #9900ff; text-shadow: 0 0 10px rgba(153,0,255,0.6); }
            66% { color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.6); }
            100% { color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.6); }
        }
        .glow-founder { animation: rgb-burn 4s infinite linear; font-weight: bold; }
        .glow-admin { color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.5); font-weight: bold; }
        .glow-user { color: #dedee6; }
        .glow-banned { color: #444 !important; text-decoration: line-through; text-shadow: none !important; }

        .badge-role { display: inline-block; font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 3px; margin-top: 8px; letter-spacing: 1px; }
        .badge-founder { background: linear-gradient(135deg, #ff0055, #9900ff); color: #fff; box-shadow: 0 0 10px rgba(255,0,85,0.4); }
        .badge-admin { background: #ff3333; color: #fff; }
        .badge-user { background: #222235; color: #aaa; }
        .badge-banned { background: #111; color: #555; }

        @media (max-width: 850px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; text-align: center; }
            .forum-container { grid-template-columns: 1fr; gap: 20px; margin: 15px auto; padding: 0 10px; }
            .main-content { padding: 20px 15px; }
            .post-row { grid-template-columns: 1fr; }
            .post-author-zone { border-right: none; border-bottom: 1px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; align-items: center; }
            .post-text-zone { padding: 15px; }
            #m-auth > div, #m-profile > div, #m-admin > div, #m-create-node > div { width: 90% !important; box-sizing: border-box; padding: 20px !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ARIES<span>ROLEPLAY</span></div>
        <div id="runtime-auth-zone"></div>
    </header>

    <div class="forum-container">
        <div class="sidebar" id="nodes-navigation-list"></div>
        <div class="main-content" id="render-forum-core">Синхронизация с сервером облака...</div>
    </div>

    <div id="m-auth" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9998;">
        <div style="background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:6px; width:340px;">
            <h3 id="auth-title" style="margin-top:0; color:#fff; font-weight:800;">Вход в систему</h3>
            <input type="text" id="f-user" class="input-field" placeholder="Введите Ваш никнейм">
            <input type="password" id="f-pass" class="input-field" placeholder="Введите пароль">
            <div id="auth-btn-container"></div>
            <button class="btn-core" style="background:#222; width:100%; margin-top:8px;" onclick="AuthModule.close()">Отмена</button>
        </div>
    </div>

    <div id="m-profile" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9998;">
        <div style="background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:6px; width:350px; text-align:center;">
            <h3 style="margin-top:0; color:#fff; font-weight:800;">Настройки профиля</h3>
            <div style="margin-bottom:20px;">
                <img id="my-profile-avatar-view" class="avatar-round" src="" style="margin-bottom:10px; display:inline-block;"><br>
                <label class="btn-core" style="background:#1c1c30; font-size:11px; padding:6px 12px;">
                    Выбрать аватарку/GIF
                    <input type="file" id="profile-file-input" accept="image/*" style="display:none;" onchange="ProfileCore.upload(event)">
                </label>
            </div>
            <label style="font-size:12px; color:#555; text-align:left; display:block; margin-bottom:5px;">Изменить игровой никнейм:</label>
            <input type="text" id="new-profile-nick" class="input-field" placeholder="Новый никнейм">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-core" onclick="ProfileCore.saveData()" style="flex:1;">Сохранить изменения</button>
                <button class="btn-core" onclick="ProfileCore.close()" style="background:#222; width:80px;">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="m-admin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9999;">
        <div style="background:#09090f; border:1px solid var(--accent); padding:30px; border-radius:6px; width:380px; box-shadow: 0 0 25px rgba(255,0,85,0.2);">
            <h3 style="margin-top:0; color:var(--accent); font-weight:800; text-transform:uppercase; font-size:16px; letter-spacing:0.5px;">🛡️ Панель Управления Создателя</h3>
            
            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:5px;">Зарегистрированные аккаунты форума:</label>
            <select id="adm-target-user" class="input-field" style="cursor:pointer;"></select>
            
            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:5px;">Цвет и свечение ника (Glow):</label>
            <select id="adm-set-glow" class="input-field">
                <option value="glow-founder">🔥 Переливание Создателя (RGB Неон)</option>
                <option value="glow-admin">🚨 Администратор (Красный неон)</option>
                <option value="glow-user">👤 Обычный игрок (Стандартный)</option>
            </select>
            
            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:5px;">Роль / Тег под ником (Badge):</label>
            <select id="adm-set-badge" class="input-field">
                <option value="badge-founder">FOUNDER</option>
                <option value="badge-admin">ADMIN</option>
                <option value="badge-user">USER</option>
            </select>

            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:5px;">Верификация (Галочка):</label>
            <select id="adm-set-verify" class="input-field">
                <option value="none">❌ Без галочки</option>
                <option value="v-blue-line">🔷 Синий контур</option>
                <option value="v-yellow-line">🔶 Желтый контур</option>
                <option value="v-red-line">🔺 Красный контур</option>
                <option value="v-blue-fill">🌟 Синяя заливка (Официальная)</option>
            </select>
            
            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:5px;">Статус блокировки на форуме:</label>
            <select id="adm-set-ban" class="input-field">
                <option value="no">Активен (Доступ разрешен)</option>
                <option value="yes">Забанить аккаунт (Блокировка)</option>
            </select>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-core" onclick="AdminPanel.save()" style="flex:1;">Применить настройки</button>
                <button class="btn-core" onclick="AdminPanel.close()" style="background:#222; width:90px;">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="m-create-node" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9999;">
        <div style="background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:6px; width:360px;">
            <h3 style="margin-top:0; color:#fff; font-weight:800;">📦 Создание нового раздела</h3>
            <label style="font-size:12px; color:#555; display:block; margin-bottom:5px;">Название (с иконкой):</label>
            <input type="text" id="node-new-title" class="input-field" placeholder="Например: 🟢 [Гетто] Los Santos Vagos">
            <label style="font-size:12px; color:#555; display:block; margin-bottom:5px;">Путь / Подкатегория:</label>
            <input type="text" id="node-new-path" class="input-field" placeholder="Например: Организации / Гетто">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-core" onclick="NodeManager.submit()" style="flex:1;">Создать раздел</button>
                <button class="btn-core" onclick="NodeManager.close()" style="background:#222; width:80px;">Отмена</button>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
