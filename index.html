<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIES ROLEPLAY — ПАНЕЛЬ СООБЩЕСТВА</title>
    
    <!-- Стили и Шрифты -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <script>
        // Твоя привязка БД (уже настроена)
        const firebaseConfig = {
            apiKey: "AIzaSyB3IcqqmojbVDiQaos8phPyWbzFCq0_TlM",
            authDomain: "aries-forum.firebaseapp.com",
            databaseURL: "https://aries-forum-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aries-forum",
            storageBucket: "aries-forum.firebasestorage.app",
            messagingSenderId: "614643963857",
            appId: "1:614643963857:web:01f1f941c72249ac6eb2f0"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>

<!-- Глобальный Прелоадер -->
<div id="loader-wrapper">
    <div class="loader-3d">
        <img src="https://i.imgur.com/8YyX29k.png" alt="Aries Logo">
        <div class="loader-bar"></div>
    </div>
</div>

<!-- Система Уведомлений -->
<div id="alert-container"></div>

<!-- Шапка Форума -->
<header class="aries-header">
    <div class="container header-flex">
        <div class="header-left">
            <div class="burger-btn" onclick="UI.toggleSidebar()"><i class="fas fa-bars"></i></div>
            <div class="logo-3d" onclick="Router.go('home')">
                <img src="https://i.imgur.com/8YyX29k.png" alt="Logo">
                <div class="logo-text">
                    <span class="main-title">ARIES</span>
                    <span class="sub-title">ROLE PLAY</span>
                </div>
            </div>
        </div>

        <div class="header-right" id="top-user-panel">
            <!-- Сюда JS отрисует колокольчик и профиль -->
            <button class="btn-auth-glow" onclick="UI.showModal('auth')">АВТОРИЗАЦИЯ</button>
        </div>
    </div>
</header>

<!-- Панель Руководства (Видна только админам) -->
<div id="admin-bar" class="admin-top-panel hidden">
    <div class="container admin-flex">
        <div class="admin-status">
            <i class="fas fa-user-shield"></i> ДОСТУП: <span class="rainbow-text" id="admin-nick-top">...</span>
        </div>
        <div class="admin-nav">
            <button onclick="AdminPanel.open()"><i class="fas fa-tools"></i> Управление</button>
            <button onclick="AdminPanel.showBans()"><i class="fas fa-user-slash"></i> Бан-лист</button>
        </div>
    </div>
</div>

<main class="main-wrapper container">
    <!-- Боковое меню -->
    <aside class="aries-sidebar" id="sidebar">
        <div class="side-nav">
            <div class="nav-label">ГЛАВНОЕ МЕНЮ</div>
            <a href="#" onclick="Router.go('home')" class="nav-item active"><i class="fas fa-home"></i> Главная страница</a>
            <a href="#" class="nav-item"><i class="fas fa-book"></i> Правила проекта</a>
            <a href="#" class="nav-item"><i class="fas fa-users"></i> Наша команда</a>
            
            <div class="nav-label">ИГРОВЫЕ МИРЫ</div>
            <div class="server-card">
                <div class="server-info">
                    <span class="s-name">Aries Role Play #1</span>
                    <span class="s-online" id="online-counter">Online: 0/1000</span>
                </div>
                <div class="server-progress"><div class="bar" style="width: 45%"></div></div>
            </div>
        </div>
    </aside>

    <!-- Основная контентная зона -->
    <section class="aries-content">
        <div id="forum-view">
            <!-- Сюда рендерится список категорий/тем -->
        </div>
    </section>
</main>

<!-- МОДАЛЬНЫЕ ОКНА -->
<div class="overlay hidden" id="modal-overlay" onclick="UI.closeModals()">
    
    <!-- Вход/Регистрация -->
    <div class="modal-window" id="modal-auth" onclick="event.stopPropagation()">
        <div class="modal-header">ВХОД ЧЕРЕЗ EMAIL</div>
        <div class="modal-body">
            <div class="captcha-box" id="captcha-area">
                <p>Введите ваш Email (на него придет ссылка):</p>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="auth-email" placeholder="ponkc29@gamil.com">
                </div>
                <!-- Простая Капча -->
                <div class="simple-captcha">
                    <span id="captcha-text"></span>
                    <input type="text" id="captcha-input" placeholder="Код с картинки">
                </div>
                <button class="btn-main-red" onclick="Auth.startLogin()">ОТПРАВИТЬ ССЫЛКУ</button>
            </div>
        </div>
    </div>

    <!-- Редактор Профиля -->
    <div class="modal-window" id="modal-settings" onclick="event.stopPropagation()">
        <div class="modal-header">НАСТРОЙКИ АККАУНТА</div>
        <div class="modal-body">
            <div class="profile-edit-grid">
                <div class="ava-section">
                    <img id="edit-preview" src="https://i.imgur.com/6EOnf8A.png">
                    <input type="file" id="ava-file" hidden accept="image/*,image/gif" onchange="Profile.handleAva(event)">
                    <button class="btn-sm" onclick="document.getElementById('ava-file').click()">ИЗМЕНИТЬ GIF/ФОТО</button>
                </div>
                <div class="info-section">
                    <label>Отображаемый ник:</label>
                    <input type="text" id="edit-nickname">
                    <label>Новая почта:</label>
                    <input type="email" id="edit-email">
                    <button class="btn-main-red" onclick="Profile.save()">СОХРАНИТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ (ADMIN) -->
    <div class="modal-window extra-wide" id="modal-admin" onclick="event.stopPropagation()">
        <div class="modal-header">ПАНЕЛЬ РУКОВОДСТВА</div>
        <div class="modal-body">
            <div class="admin-tabs">
                <button onclick="AdminPanel.setTab('users')">Пользователи</button>
                <button onclick="AdminPanel.setTab('forum')">Разделы</button>
                <button onclick="AdminPanel.setTab('logs')">Логи действий</button>
            </div>
            <div id="admin-tab-content">
                <!-- Контент админки -->
            </div>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
