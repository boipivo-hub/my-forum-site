<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aries Role Play — Панель Создателя</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root {
            --bg-main: #06060c;
            --bg-card: #0c0c14;
            --border-color: #1c1c30;
            --accent: #ff0055;
            --neon-blue: #00d2ff;
            --neon-blue-glow: rgba(0, 210, 255, 0.4);
            --neon-red: #ff003c;
            --neon-red-glow: rgba(255, 0, 60, 0.6);
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: #dedee6;
            -webkit-tap-highlight-color: transparent;
        }
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; }
        .logo-triangle { width: 28px; height: 28px; filter: drop-shadow(0 0 6px rgba(235, 15, 15, 0.7)); }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: #fff; line-height: 1; }
        .logo span { color: var(--accent); }
        
        .forum-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .sidebar { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; height: fit-content; }
        .sidebar-title { font-size: 12px; text-transform: uppercase; color: #555; letter-spacing: 1px; margin-bottom: 15px; font-weight: bold; }
        
        /* СТИЛЬ КНОПОК РАЗДЕЛОВ */
        .nav-link, .topic-link { 
            display: block; color: #fff; text-decoration: none; padding: 12px 16px; border-radius: 6px; margin-bottom: 8px; font-size: 14px; font-weight: 600;
            background: #0d1b2a; border: 1px solid var(--neon-blue);
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2), 0 0 10px var(--neon-blue-glow);
            transition: all 0.25s; cursor: pointer;
        }
        .nav-link.active, .topic-link.active { 
            background: linear-gradient(135deg, #b7094c, var(--neon-red)) !important; 
            border-color: #ff4d6d !important;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.3), 0 0 20px var(--neon-red-glow) !important;
        }

        .main-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 30px; min-height: 500px; }
        .post-row { display: grid; grid-template-columns: 190px 1fr; background: #08080d; border: 1px solid var(--border-color); border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        .post-author-zone { background: #0b0b12; padding: 20px; text-align: center; border-right: 1px solid var(--border-color); }
        .post-text-zone { padding: 25px; white-space: pre-wrap; color: #cdcdff; font-size: 14px; line-height: 1.6; }

        .btn-core { 
            background: linear-gradient(135deg, var(--accent), #9900ff); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 11px 22px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; text-transform: uppercase;
        }

        .input-field { width: 100%; background: #11111e; border: 1px solid var(--border-color); padding: 12px; border-radius: 4px; color: #fff; margin-bottom: 15px; }
        .avatar-mini { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .avatar-round { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #1c1c30; }

        /* Glows */
        @keyframes rgb-burn {
            0% { color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.6); }
            33% { color: #9900ff; text-shadow: 0 0 10px rgba(153,0,255,0.6); }
            66% { color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.6); }
            100% { color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.6); }
        }
        .glow-founder { animation: rgb-burn 4s infinite linear; font-weight: bold; }
        .glow-admin { color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.5); font-weight: bold; }
        .badge-role { display: inline-block; font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 3px; margin-top: 8px; }
        .badge-founder { background: linear-gradient(135deg, #ff0055, #9900ff); color: #fff; }
        .badge-admin { background: #ff3333; color: #fff; }
        
        /* Verification Badges */
        .verified-badge { display: inline-block; width: 13px; height: 13px; margin-left: 5px; vertical-align: middle; background-size: contain; background-repeat: no-repeat; }
        .v-blue-fill { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%232196F3" d="M50 14l5.7 4 6.5-2.3 4 5.7 6.9-.5 1.8 6.7 6.7 1.8-.5 6.9 5.7 4-2.3 6.5 4 5.7-4 5.7 2.3 6.5-5.7 4 .5 6.9-6.7 1.8-1.8 6.7-6.9-.5-4 5.7-6.5-2.3-5.7 4-5.7-4-6.5 2.3-4-5.7-6.9.5-1.8-6.7-6.7-1.8.5-6.9-5.7-4 2.3-6.5-4-5.7 4-5.7-2.3-6.5 5.7-4-.5-6.9 6.7-1.8 1.8-6.7 6.9.5 4-5.7 6.5 2.3z"/><path fill="none" stroke="%23FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" d="M39 51l8.5 8.5 16-17"/></svg>'); }

        @media (max-width: 850px) {
            header { padding: 15px 20px; flex-direction: column; }
            .forum-container { grid-template-columns: 1fr; }
            .post-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <svg class="logo-triangle" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,12 10,88 90,88" fill="#7a001e" />
                <polygon points="50,15 14,85 86,85" fill="#c61030" />
                <polygon points="50,38 30,75 70,75" fill="#0c0c14" />
            </svg>
            <div class="logo">ARIES<span>ROLEPLAY</span></div>
        </div>
        <div id="runtime-auth-zone"></div>
    </header>

    <div class="forum-container">
        <div class="sidebar" id="nodes-navigation-list"></div>
        <div class="main-content" id="render-forum-core"></div>
    </div>

    <!-- Модалка Авторизации (EMAIL LINK) -->
    <div id="m-auth" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9998;">
        <div style="background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:6px; width:340px;">
            <h3 id="auth-title" style="margin-top:0; color:#fff; font-weight:800;">Вход по почте</h3>
            <p style="font-size: 11px; color: #777;">Введите почту. Мы отправим письмо для входа.</p>
            <input type="email" id="f-email" class="input-field" placeholder="example@mail.com">
            <input type="text" id="f-nick" class="input-field" placeholder="Ваш никнейм (для новых)">
            <div id="auth-btn-container"></div>
            <button class="btn-core" style="background: #222; width:100%; margin-top:8px;" onclick="AuthModule.close()">Отмена</button>
        </div>
    </div>

    <!-- Модалка Администратора -->
    <div id="m-admin" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9999;">
        <div style="background:#09090f; border:1px solid var(--accent); padding:30px; border-radius:6px; width:380px;">
            <h3 style="color:var(--accent);">🛡️ Панель Управления</h3>
            <select id="adm-target-user" class="input-field"></select>
            <label>Цвет ника:</label>
            <select id="adm-set-glow" class="input-field">
                <option value="glow-founder">RGB Неон</option>
                <option value="glow-admin">Красный</option>
                <option value="glow-user">Обычный</option>
            </select>
            <button class="btn-core" onclick="AdminPanel.save()" style="width:100%">Применить</button>
            <button class="btn-core" onclick="AdminPanel.close()" style="background:#222; width:100%; margin-top:8px;">Закрыть</button>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
