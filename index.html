<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARIES RP FORUM</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { /* твой конфиг */ };
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>

    <!-- Зона входа -->
    <div id="auth-zone">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <input type="text" id="nickname" placeholder="Никнейм">
        <button onclick="AuthSystem.register(document.getElementById('email').value, document.getElementById('password').value, document.getElementById('nickname').value)">Регистрация</button>
        <button onclick="AuthSystem.login(document.getElementById('email').value, document.getElementById('password').value)">Войти</button>
    </div>

    <!-- Загрузка скриптов в строгом порядке -->
    <script src="auth-system.js"></script>
    <script src="engine.js"></script>
    <script src="ui-manager.js"></script>
</body>
</html>
