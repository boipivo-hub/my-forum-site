<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIES ROLEPLAY — ФОРУМНЫЙ ДВИЖОК V8</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3IcqqmojbVDiQaos8phPyWbzFCq0_TlM",
            authDomain: "aries-forum.firebaseapp.com",
            databaseURL: "https://aries-forum-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aries-forum",
            storageBucket: "aries-forum.firebasestorage.app",
            messagingSenderId: "614643963857",
            appId: "1:614643963857:web:01f1f941c72249ac6eb2f0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
    </script>
</head>
<body>

    <div id="toast-container"></div>

    <!-- АДМИН ПАНЕЛЬ (ТОЛЬКО ДЛЯ ТЕБЯ) -->
    <div id="owner-panel" class="admin-top-bar hidden">
        <div class="container flex-sb">
            <div class="admin-info">
                <i class="fas fa-crown"></i> РУКОВОДСТВО: <span class="rainbow-text">Qumestlies_Shawty</span>
            </div>
            <div class="admin-btns">
                <button onclick="Admin.createCategory()">СОЗДАТЬ РАЗДЕЛ</button>
                <button onclick="Admin.openUserManage()">УПРАВЛЕНИЕ ИГРОКАМИ</button>
            </div>
        </div>
    </div>

    <!-- ШАПКА -->
    <header class="header">
        <div class="container flex-sb h-100">
            <div class="header-left flex-center">
                <div class="logo-3d" onclick="location.reload()">
                    <img src="https://i.imgur.com/8YyX29k.png">
                    <div class="brand">ARIES <span>ROLEPLAY</span></div>
                </div>
            </div>
            <div class="header-right" id="user-zone">
                <button class="btn-red-glow" onclick="UI.modal('auth')">ВОЙТИ / СОЗДАТЬ АККАУНТ</button>
            </div>
        </div>
    </header>

    <main class="container main-layout">
        <aside class="sidebar">
            <div class="sb-block">
                <div class="sb-label">МЕНЮ</div>
                <a href="#" onclick="Router.home()" class="sb-link active"><i class="fas fa-home"></i> Главная</a>
                <a href="#" class="sb-link"><i class="fas fa-scroll"></i> Правила</a>
                <a href="#" class="sb-link"><i class="fas fa-user-shield"></i> Команда</a>
            </div>
        </aside>

        <section class="content" id="forum-root">
            <div class="loader-box">Синхронизация с базой данных...</div>
        </section>
    </main>

    <!-- МОДАЛКИ -->
    <div id="modal-overlay" class="overlay hidden" onclick="UI.closeModals()">
        
        <!-- Авторизация/Регистрация (Ник + Email сразу) -->
        <div class="modal hidden" id="modal-auth" onclick="event.stopPropagation()">
            <div class="modal-h">АВТОРИЗАЦИЯ</div>
            <div class="modal-b">
                <div class="form">
                    <label>Игровой Никнейм:</label>
                    <input type="text" id="auth-nick" placeholder="Player_Name">
                    <label>Ваш Email:</label>
                    <input type="email" id="auth-email" placeholder="ponkc29@gamil.com">
                    
                    <!-- КАПЧА -->
                    <div class="captcha-wrap">
                        <div id="captcha-code">---</div>
                        <input type="text" id="captcha-input" placeholder="Код">
                    </div>

                    <button class="btn-full" onclick="AuthManager.initAuth()">ОТПРАВИТЬ ССЫЛКУ</button>
                </div>
            </div>
        </div>

        <!-- Настройки ПРОФИЛЯ -->
        <div class="modal hidden" id="modal-profile" onclick="event.stopPropagation()">
            <div class="modal-h">НАСТРОЙКИ АККАУНТА</div>
            <div class="modal-b">
                <div class="profile-edit">
                    <img id="pe-ava" src="https://i.imgur.com/6EOnf8A.png">
                    <input type="file" id="pe-file" hidden accept="image/*,image/gif" onchange="Profile.handleAva(event)">
                    <button class="btn-sm" onclick="document.getElementById('pe-file').click()">СМЕНИТЬ GIF/ФОТО</button>
                    <input type="text" id="pe-status" placeholder="Ваш статус...">
                    <button class="btn-full" onclick="Profile.save()">СОХРАНИТЬ</button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
