 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ARIES RP | Форум в стиле XenForo</title>
    <style>
        :root { --dark-bg: #141414; --xen-blue: #0095f6; --admin-red: #ff3333; --ga-orange: #ffaa00; }
        body { background: #000; color: #ccc; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Стили групп (как в XenForo) */
        .nick-admin { color: var(--admin-red); font-weight: bold; text-shadow: 0 0 5px rgba(255,51,51,0.5); }
        .nick-ga { color: var(--ga-orange); font-weight: bold; }
        .nick-user { color: #fff; }
        .badge-verified { color: var(--xen-blue); font-size: 12px; margin-left: 4px; }

        /* Общие элементы */
        .forum-header { background: #1a1a1a; padding: 20px; border-bottom: 2px solid var(--admin-red); text-align: center; }
        .main-container { max-width: 950px; margin: 20px auto; background: #111; border: 1px solid #333; padding: 20px; }
        
        /* Админ-панель */
        .admin-box { border: 1px solid #444; padding: 15px; margin-bottom: 20px; background: #0a0a0a; border-radius: 4px; }
        button { background: #333; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="forum-header">
        <h1>ARIES <span style="color:var(--admin-red)">ROLE PLAY</span></h1>
    </div>

    <div class="main-container">
        <!-- Панель управления -->
        <div class="admin-box">
            <strong>⚙️ Панель управления (XenForo Style):</strong><br><br>
            <select id="user-select"><option value="Qumestlies_Shawty">Qumestlies_Shawty</option><option value="Sam_Mason">Sam_Mason</option></select>
            <select id="role-select"><option value="admin">Администратор</option><option value="ga">ГА</option><option value="user">Игрок</option></select>
            <input type="checkbox" id="check-ver"> Верификация (Галочка)
            <button onclick="applyXenStyle()">Применить стиль</button>
        </div>

        <div id="chat-box" style="padding: 10px; border: 1px solid #222;">
            <!-- Сообщения будут появляться здесь -->
        </div>
    </div>

    <script>
        let users = {
            'Qumestlies_Shawty': { role: 'admin', ver: true },
            'Sam_Mason': { role: 'user', ver: false }
        };

        function applyXenStyle() {
            let u = document.getElementById('user-select').value;
            users[u].role = document.getElementById('role-select').value;
            users[u].ver = document.getElementById('check-ver').checked;
            renderChat();
        }

        function renderChat() {
            let chat = document.getElementById('chat-box');
            chat.innerHTML = '';
            for(let name in users) {
                let u = users[name];
                let style = u.role === 'admin' ? 'nick-admin' : (u.role === 'ga' ? 'nick-ga' : 'nick-user');
                let badge = u.ver ? '<span class="badge-verified">✔</span>' : '';
                chat.innerHTML += `<div style="margin-bottom:10px;">
                    <span class="${style}">${name}</span> ${badge} — статус: ${u.role}
                </div>`;
            }
        }
        renderChat();
    </script>
</body>
</html>
