<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aries Role Play — Cloud Forum</title>
    
    <!-- FIREBASE SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --bg-main: #06060c;
            --bg-card: #0c0c14;
            --border-color: #1c1c30;
            --accent: #ff0055;
            --neon-blue: #00d2ff;
            --neon-red: #ff003c;
            --success: #70e000;
            --warning: #ffb700;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-main);
            color: #dedee6;
            overflow-x: hidden;
        }

        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        
        .logo { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        /* СИСТЕМА ГАЛОЧЕК (ВЕРИФИКАЦИЯ) */
        .verified-badge {
            display: inline-block; width: 14px; height: 14px; margin-left: 5px; 
            vertical-align: middle; background-size: contain; background-repeat: no-repeat;
        }
        .v-blue-line { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="none" stroke="%232196F3" stroke-width="6" d="M50 14l5.7 4 6.5-2.3 4 5.7 6.9-.5 1.8 6.7 6.7 1.8-.5 6.9 5.7 4-2.3 6.5 4 5.7-4 5.7 2.3 6.5-5.7 4 .5 6.9-6.7 1.8-1.8 6.7-6.9-.5-4 5.7-6.5-2.3-5.7 4-5.7-4-6.5 2.3-4-5.7-6.9.5-1.8-6.7-6.7-1.8.5-6.9-5.7-4 2.3-6.5-4-5.7 4-5.7-2.3-6.5 5.7-4-.5-6.9 6.7-1.8 1.8-6.7 6.9.5 4-5.7 6.5 2.3z"/><path fill="none" stroke="%232196F3" stroke-width="8" d="M39 51l8.5 8.5 16-17"/></svg>'); }
        .v-yellow-line { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="none" stroke="%23FFEB3B" stroke-width="6" d="M50 14l5.7 4 6.5-2.3 4 5.7 6.9-.5 1.8 6.7 6.7 1.8-.5 6.9 5.7 4-2.3 6.5 4 5.7-4 5.7 2.3 6.5-5.7 4 .5 6.9-6.7 1.8-1.8 6.7-6.9-.5-4 5.7-6.5-2.3-5.7 4-5.7-4-6.5 2.3-4-5.7-6.9.5-1.8-6.7-6.7-1.8.5-6.9-5.7-4 2.3-6.5-4-5.7 4-5.7-2.3-6.5 5.7-4-.5-6.9 6.7-1.8 1.8-6.7 6.9.5 4-5.7 6.5 2.3z"/><path fill="none" stroke="%23FFEB3B" stroke-width="8" d="M39 51l8.5 8.5 16-17"/></svg>'); }
        .v-red-line { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="none" stroke="%23F44336" stroke-width="6" d="M50 14l5.7 4 6.5-2.3 4 5.7 6.9-.5 1.8 6.7 6.7 1.8-.5 6.9 5.7 4-2.3 6.5 4 5.7-4 5.7 2.3 6.5-5.7 4 .5 6.9-6.7 1.8-1.8 6.7-6.9-.5-4 5.7-6.5-2.3-5.7 4-5.7-4-6.5 2.3-4-5.7-6.9.5-1.8-6.7-6.7-1.8.5-6.9-5.7-4 2.3-6.5-4-5.7 4-5.7-2.3-6.5 5.7-4-.5-6.9 6.7-1.8 1.8-6.7 6.9.5 4-5.7 6.5 2.3z"/><path fill="none" stroke="%23F44336" stroke-width="8" d="M39 51l8.5 8.5 16-17"/></svg>'); }
        .v-blue-fill { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%232196F3" d="M50 14l5.7 4 6.5-2.3 4 5.7 6.9-.5 1.8 6.7 6.7 1.8-.5 6.9 5.7 4-2.3 6.5 4 5.7-4 5.7 2.3 6.5-5.7 4 .5 6.9-6.7 1.8-1.8 6.7-6.9-.5-4 5.7-6.5-2.3-5.7 4-5.7-4-6.5 2.3-4-5.7-6.9.5-1.8-6.7-6.7-1.8.5-6.9-5.7-4 2.3-6.5-4-5.7 4-5.7-2.3-6.5 5.7-4-.5-6.9 6.7-1.8 1.8-6.7 6.9.5 4-5.7 6.5 2.3z"/><path fill="none" stroke="%23FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" d="M39 51l8.5 8.5 16-17"/></svg>'); }

        /* РОЛИ И ЭФФЕКТЫ */
        @keyframes rgb-burn {
            0% { color: #ff0055; text-shadow: 0 0 8px rgba(255,0,85,0.5); }
            33% { color: #9900ff; text-shadow: 0 0 8px rgba(153,0,255,0.5); }
            66% { color: #00f0ff; text-shadow: 0 0 8px rgba(0,240,255,0.5); }
            100% { color: #ff0055; text-shadow: 0 0 8px rgba(255,0,85,0.5); }
        }
        .glow-founder { animation: rgb-burn 3s infinite linear; font-weight: bold; }
        .glow-admin { color: #ff3333; text-shadow: 0 0 5px rgba(255,51,51,0.5); font-weight: bold; }
        
        .badge-role { display: inline-block; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 3px; margin-top: 4px; text-transform: uppercase; }
        .badge-founder { background: linear-gradient(135deg, #ff0055, #9900ff); color: #fff; }
        .badge-admin { background: #ff3333; color: #fff; }
        .badge-user { background: #222; color: #888; }

        /* СТАТУСЫ ТЕМ */
        .status-badge { font-size: 10px; padding: 3px 6px; border-radius: 3px; font-weight: bold; margin-right: 10px; }
        .status-open { color: var(--success); border: 1px solid var(--success); }
        .status-closed { color: var(--neon-red); border: 1px solid var(--neon-red); }
        .status-review { color: var(--warning); border: 1px solid var(--warning); }

        /* ИНТЕРФЕЙС */
        .forum-container { display: grid; grid-template-columns: 260px 1fr; gap: 25px; max-width: 1300px; margin: 25px auto; padding: 0 15px; }
        .sidebar { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; height: fit-content; }
        .nav-link { display: block; color: #fff; text-decoration: none; padding: 10px 15px; border-radius: 4px; margin-bottom: 5px; background: #0d1b2a; border: 1px solid var(--neon-blue); cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-link:hover { transform: translateX(5px); }
        
        .main-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 25px; min-height: 500px; }
        .post-card { background: #08080d; border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 15px; padding: 15px; }
        
        .btn-core { background: linear-gradient(135deg, var(--accent), #9900ff); color: #fff; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-core:hover { opacity: 0.8; transform: translateY(-1px); }
        
        .input-field { width: 100%; background: #11111e; border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        
        .avatar-main { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }
        .avatar-mini { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); cursor: pointer; }

        /* МОДАЛКИ */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:9999; }
        .modal-content { background:var(--bg-card); padding:25px; border-radius:8px; width:360px; border:1px solid var(--border-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo">ARIES<span>ROLEPLAY</span></div>
        <div id="header-auth" style="display:flex; align-items:center; gap:15px;">
            <!-- Сюда грузится статус входа -->
        </div>
    </header>

    <div class="forum-container">
        <aside class="sidebar">
            <div style="font-size:11px; color:#555; margin-bottom:10px; font-weight:bold;">НАВИГАЦИЯ</div>
            <div class="nav-link" onclick="Forum.load('news')">📢 Новости</div>
            <div class="nav-link" onclick="Forum.load('general')">💬 Общение</div>
            <div id="admin-btn-zone" style="margin-top:20px; display:none;">
                <button class="btn-core" style="width:100%; background:#111; border:1px solid var(--accent);" onclick="Admin.open()">🛡️ Панель Создателя</button>
            </div>
        </aside>

        <main class="main-content" id="forum-render">
            <h3 style="text-align:center; padding-top:50px;">Синхронизация Aries Cloud...</h3>
        </main>
    </div>

    <!-- МОДАЛКА ВХОДА -->
    <div id="m-auth" class="modal">
        <div class="modal-content" style="text-align:center;">
            <h3>Авторизация</h3>
            <button class="btn-core" style="width:100%; background:#fff; color:#000;" onclick="Auth.google()">Войти через Google</button>
            <div style="margin:15px 0; font-size:10px; color:#444;">ИЛИ MAGIC LINK</div>
            <input type="email" id="auth-email" class="input-field" placeholder="Ваша почта">
            <button class="btn-core" style="width:100%;" onclick="Auth.magic()">Получить ссылку на вход</button>
            <button class="btn-core" style="width:100%; margin-top:10px; background:#222;" onclick="UI.close('m-auth')">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛКА ПРОФИЛЯ -->
    <div id="m-profile" class="modal">
        <div class="modal-content" style="text-align:center;">
            <h3 style="margin-top:0;">Настройки профиля</h3>
            <img id="p-avatar-view" class="avatar-main" src="">
            <br>
            <label class="btn-core" style="font-size:10px; margin:10px 0; display:inline-block;">
                Выбрать Фото / GIF
                <input type="file" id="p-file" accept="image/*" style="display:none;" onchange="Profile.preview(event)">
            </label>
            <input type="text" id="p-nick" class="input-field" placeholder="Изменить ник">
            <input type="password" id="p-pass" class="input-field" placeholder="Новый пароль">
            <button class="btn-core" style="width:100%;" onclick="Profile.save()">Сохранить изменения</button>
            <button class="btn-core" style="width:100%; margin-top:10px; background:#222;" onclick="UI.close('m-profile')">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛКА АДМИНА (ПАРИМЕТРЫ) -->
    <div id="m-admin" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent); margin-top:0;">🛡️ Управление пользователем</h3>
            <select id="adm-user-list" class="input-field"></select>
            
            <label style="font-size:10px; color:#555;">Роль:</label>
            <select id="adm-role" class="input-field">
                <option value="badge-user">User</option>
                <option value="badge-admin">Admin</option>
                <option value="badge-founder">Founder</option>
            </select>

            <label style="font-size:10px; color:#555;">Эффект имени:</label>
            <select id="adm-glow" class="input-field">
                <option value="none">Обычный</option>
                <option value="glow-admin">Красный</option>
                <option value="glow-founder">RGB Founder</option>
            </select>

            <label style="font-size:10px; color:#555;">Верификация (Галочка):</label>
            <select id="adm-verify" class="input-field">
                <option value="none">❌ Нет</option>
                <option value="v-blue-line">🔷 Синий контур</option>
                <option value="v-yellow-line">🔶 Желтый контур</option>
                <option value="v-red-line">🔺 Красный контур</option>
                <option value="v-blue-fill">🌟 Синяя заливка</option>
            </select>

            <label style="font-size:10px; color:#555;">Санкции:</label>
            <select id="adm-ban" class="input-field">
                <option value="no">✅ Активен</option>
                <option value="yes">🚫 БАН (Закрыть вход)</option>
                <option value="mute">🔇 МУТ (Запрет писать)</option>
            </select>

            <button class="btn-core" style="width:100%;" onclick="Admin.save()">Применить настройки</button>
            <button class="btn-core" style="width:100%; margin-top:10px; background:#222;" onclick="UI.close('m-admin')">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛКА СОЗДАНИЯ ТЕМЫ -->
    <div id="m-topic" class="modal">
        <div class="modal-content">
            <h3>Создание темы</h3>
            <input type="text" id="t-title" class="input-field" placeholder="Заголовок">
            <textarea id="t-text" class="input-field" style="height:120px; resize:none;" placeholder="Текст..."></textarea>
            <select id="t-status" class="input-field">
                <option value="status-open">Открыто</option>
                <option value="status-closed">Закрыто</option>
                <option value="status-review">На рассмотрении</option>
            </select>
            <button class="btn-core" style="width:100%;" onclick="Forum.post()">Опубликовать</button>
            <button class="btn-core" style="width:100%; margin-top:10px; background:#222;" onclick="UI.close('m-topic')">Отмена</button>
        </div>
    </div>

    <script>
        // === ТВОИ ДАННЫЕ FIREBASE ===
        const firebaseConfig = {
          apiKey: "AIzaSyB3IcqqmojbVDiQaos8phPyWbzFCq0_TlM",
          authDomain: "aries-forum.firebaseapp.com",
          databaseURL: "https://aries-forum-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "aries-forum",
          storageBucket: "aries-forum.firebasestorage.app",
          messagingSenderId: "614643963857",
          appId: "1:614643963857:web:01f1f941c72249ac6eb2f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let userData = null;
        let currentCategory = 'news';

        const UI = {
            show: (id) => document.getElementById(id).style.display = 'flex',
            close: (id) => document.getElementById(id).style.display = 'none',
            renderUser: () => {
                const zone = document.getElementById('header-auth');
                if (userData) {
                    zone.innerHTML = `
                        <img src="${userData.avatar || 'https://via.placeholder.com/32'}" class="avatar-mini" onclick="UI.show('m-profile')">
                        <div class="${userData.glow}" style="font-weight:bold; cursor:pointer;" onclick="UI.show('m-profile')">${userData.nick}</div>
                        <button class="btn-core" style="background:#222; font-size:10px;" onclick="auth.signOut()">Выход</button>
                    `;
                    if (userData.role === 'badge-founder' || userData.role === 'badge-admin') {
                        document.getElementById('admin-btn-zone').style.display='block';
                    }
                } else {
                    zone.innerHTML = `<button class="btn-core" onclick="UI.show('m-auth')">Войти</button>`;
                }
            }
        };

        const Auth = {
            google: () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).then(() => location.reload());
            },
            magic: () => {
                const email = document.getElementById('auth-email').value;
                auth.sendSignInLinkToEmail(email, { url: window.location.href, handleCodeInApp: true })
                .then(() => {
                    window.localStorage.setItem('emailForSignIn', email);
                    alert('Ссылка для входа отправлена на почту!');
                });
            }
        };

        const Profile = {
            preview: (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    document.getElementById('p-avatar-view').src = reader.result;
                    userData.tempAvatar = reader.result;
                };
                reader.readAsDataURL(file);
            },
            save: async () => {
                const updates = {};
                const nick = document.getElementById('p-nick').value;
                const pass = document.getElementById('p-pass').value;
                if(nick) updates.nick = nick;
                if(userData.tempAvatar) updates.avatar = userData.tempAvatar;
                await db.ref('users/' + auth.currentUser.uid).update(updates);
                if(pass) auth.currentUser.updatePassword(pass);
                location.reload();
            }
        };

        const Forum = {
            load: async (cat) => {
                currentCategory = cat;
                document.getElementById('forum-render').innerHTML = `<h3 style="text-align:center;">Загрузка ${cat}...</h3>`;
                const snap = await db.ref('topics/' + cat).once('value');
                const data = snap.val() || {};
                let html = userData ? `<button class="btn-core" style="width:100%; margin-bottom:20px;" onclick="UI.show('m-topic')">+ Создать тему</button>` : '';
                
                Object.keys(data).reverse().forEach(id => {
                    const t = data[id];
                    html += `
                        <div class="post-card" onclick="Forum.view('${id}')" style="cursor:pointer;">
                            <span class="status-badge ${t.status}">${t.status.replace('status-', '').toUpperCase()}</span>
                            <span style="font-weight:bold; font-size:16px;">${t.title}</span>
                            <div style="font-size:11px; color:#555; margin-top:8px;">Автор: ${t.authorNick}</div>
                        </div>
                    `;
                });
                document.getElementById('forum-render').innerHTML = html || '<p style="text-align:center;">Тем пока нет</p>';
            },
            view: async (id) => {
                const snap = await db.ref('topics/' + currentCategory + '/' + id).once('value');
                const t = snap.val();
                let html = `
                    <button class="btn-core" style="background:#222; margin-bottom:15px;" onclick="Forum.load(currentCategory)">❮ Назад</button>
                    <div class="post-card">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                            <img src="${t.authorAvatar || 'https://via.placeholder.com/32'}" class="avatar-mini">
                            <div>
                                <span class="${t.authorGlow}">${t.authorNick}</span>
                                <div class="verified-badge ${t.authorVerify}"></div><br>
                                <span class="badge-role ${t.authorBadge}">${t.authorBadge.split('-')[1]}</span>
                            </div>
                        </div>
                        <div style="color:#cdcdff; line-height:1.6; white-space: pre-wrap;">${t.text}</div>
                    </div>
                    <div id="replies-zone"></div>
                    ${userData && userData.sanction !== 'mute' && t.status !== 'status-closed' ? `
                        <div class="post-card">
                            <textarea id="reply-text" class="input-field" placeholder="Ваш ответ игроку..."></textarea>
                            <button class="btn-core" onclick="Forum.reply('${id}')">Отправить ответ</button>
                        </div>
                    ` : ''}
                `;
                document.getElementById('forum-render').innerHTML = html;
                Forum.loadReplies(id);
            },
            post: async () => {
                if(userData.sanction === 'mute') return alert('У вас мут!');
                const title = document.getElementById('t-title').value;
                const text = document.getElementById('t-text').value;
                const status = document.getElementById('t-status').value;
                if(!title || !text) return alert('Заполните все поля!');
                const topic = {
                    title, text, status, 
                    authorNick: userData.nick, authorAvatar: userData.avatar || '',
                    authorGlow: userData.glow, authorBadge: userData.role, authorVerify: userData.verify || 'none'
                };
                await db.ref('topics/' + currentCategory).push(topic);
                UI.close('m-topic');
                Forum.load(currentCategory);
            },
            reply: async (id) => {
                const text = document.getElementById('reply-text').value;
                if(!text) return;
                const r = {
                    text, authorNick: userData.nick, authorAvatar: userData.avatar || '',
                    authorGlow: userData.glow, authorBadge: userData.role, authorVerify: userData.verify || 'none'
                };
                await db.ref('replies/' + id).push(r);
                Forum.view(id);
            },
            loadReplies: async (id) => {
                const snap = await db.ref('replies/' + id).once('value');
                const data = snap.val() || {};
                let html = '';
                Object.keys(data).forEach(rid => {
                    const r = data[rid];
                    html += `
                        <div class="post-card" style="margin-left:20px; border-left:2px solid var(--accent);">
                            <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                                <img src="${r.authorAvatar || 'https://via.placeholder.com/32'}" class="avatar-mini" style="width:24px; height:24px;">
                                <span class="${r.authorGlow}" style="font-size:12px;">${r.authorNick}</span>
                                <div class="verified-badge ${r.authorVerify}"></div>
                            </div>
                            <div style="font-size:13px; white-space: pre-wrap;">${r.text}</div>
                        </div>
                    `;
                });
                document.getElementById('replies-zone').innerHTML = html;
            }
        };

        const Admin = {
            open: async () => {
                const snap = await db.ref('users').once('value');
                const users = snap.val();
                let html = '';
                Object.keys(users).forEach(uid => html += `<option value="${uid}">${users[uid].nick}</option>`);
                document.getElementById('adm-user-list').innerHTML = html;
                UI.show('m-admin');
            },
            save: async () => {
                const uid = document.getElementById('adm-user-list').value;
                const role = document.getElementById('adm-role').value;
                const glow = document.getElementById('adm-glow').value;
                const verify = document.getElementById('adm-verify').value;
                const sanction = document.getElementById('adm-ban').value;
                await db.ref('users/' + uid).update({ role, glow, verify, sanction });
                alert('Настройки игрока обновлены!');
            }
        };

        auth.onAuthStateChanged(async (u) => {
            if (u) {
                const snap = await db.ref('users/' + u.uid).once('value');
                userData = snap.val();
                if (!userData) {
                    userData = { nick: u.displayName || 'Player', role: 'badge-user', glow: 'none', avatar: u.photoURL || '', sanction: 'no' };
                    db.ref('users/' + u.uid).set(userData);
                }
                if (userData.sanction === 'yes') {
                    document.body.innerHTML = '<h1 style="text-align:center; color:red; margin-top:100px;">ВАШ ФОРУМНЫЙ АККАУНТ ЗАБАНЕН</h1>';
                    return;
                }
                document.getElementById('p-nick').value = userData.nick;
                document.getElementById('p-avatar-view').src = userData.avatar || 'https://via.placeholder.com/90';
            }
            UI.renderUser();
            Forum.load('news');
        });

        // ПРОВЕРКА MAGIC LINK
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) email = window.prompt('Введите ваш email для подтверждения:');
            auth.signInWithEmailLink(email, window.location.href).then(() => {
                window.localStorage.removeItem('emailForSignIn');
                location.reload();
            });
        }
    </script>
</body>
</html>
