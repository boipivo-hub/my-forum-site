<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIES RP | OFFICIAL COMMUNITY FORUM</title>
    
    <!-- Стили и Шрифты -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK (Compatible) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <script>
        // Твоя конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyB3IcqqmojbVDiQaos8phPyWbzFCq0_TlM",
            authDomain: "aries-forum.firebaseapp.com",
            databaseURL: "https://aries-forum-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aries-forum",
            storageBucket: "aries-forum.firebasestorage.app",
            messagingSenderId: "614643963857",
            appId: "1:614643963857:web:01f1f941c72249ac6eb2f0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
    </script>
</head>
<body>

    <!-- 3D ПРЕЛОАДЕР -->
    <div id="app-preloader">
        <div class="cube-container">
            <div class="cube">
                <div class="face front"><img src="https://i.imgur.com/8YyX29k.png"></div>
                <div class="face back"><img src="https://i.imgur.com/8YyX29k.png"></div>
                <div class="face left"><img src="https://i.imgur.com/8YyX29k.png"></div>
                <div class="face right"><img src="https://i.imgur.com/8YyX29k.png"></div>
            </div>
            <div class="loader-text">ЗАГРУЗКА ARIES RP...</div>
        </div>
    </div>

    <!-- ТОСТ-УВЕДОМЛЕНИЯ -->
    <div id="toast-manager"></div>

    <!-- ШАПКА -->
    <header class="main-nav">
        <div class="container flex-nav">
            <div class="nav-left">
                <div class="logo-3d-box" onclick="location.reload()">
                    <img src="https://i.imgur.com/8YyX29k.png" class="logo-main">
                    <div class="logo-names">
                        <span class="brand">ARIES <span>RP</span></span>
                        <span class="slogan">OFFICIAL FORUM</span>
                    </div>
                </div>
            </div>
            <div class="nav-right" id="auth-node">
                <!-- Сюда попадет профиль -->
                <button class="btn-glow" onclick="UIManager.openModal('auth')">ВХОД</button>
            </div>
        </div>
    </header>

    <!-- ПАНЕЛЬ РУКОВОДСТВА (ТОЛЬКО ДЛЯ ТЕБЯ) -->
    <div id="owner-strip" class="admin-strip hidden">
        <div class="container flex-admin">
            <span class="rainbow-text"><i class="fas fa-crown"></i> ПАНЕЛЬ РУКОВОДСТВА: Qumestlies_Shawty</span>
            <div class="admin-btns">
                <button onclick="UIManager.createCategory()"><i class="fas fa-folder-plus"></i> НОВЫЙ РАЗДЕЛ</button>
                <button onclick="UIManager.openModal('admin-console')"><i class="fas fa-terminal"></i> КОНСОЛЬ</button>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="container app-grid">
        <aside class="sidebar">
            <div class="side-block">
                <div class="sb-label">МЕНЮ</div>
                <a href="#" class="sb-link active"><i class="fas fa-home"></i> Главная</a>
                <a href="#" class="sb-link"><i class="fas fa-gavel"></i> Правила</a>
                <a href="#" class="sb-link"><i class="fas fa-users"></i> Команда</a>
            </div>
        </aside>

        <section class="forum-body">
            <div id="dynamic-content">
                <!-- Сюда грузится форум -->
            </div>
        </section>
    </main>

    <!-- МОДАЛКИ -->
    <div id="modal-overlay" class="modal-bg hidden" onclick="UIManager.closeModals()">
        <!-- Вход -->
        <div class="modal-box hidden" id="modal-auth" onclick="event.stopPropagation()">
            <div class="modal-header">АВТОРИЗАЦИЯ</div>
            <div class="modal-body">
                <input type="email" id="login-email" placeholder="ponkc29@gamil.com">
                <button class="btn-action" onclick="AuthSystem.sendLink()">ПОЛУЧИТЬ ССЫЛКУ</button>
            </div>
        </div>

        <!-- Создание ТЕМЫ -->
        <div class="modal-box hidden" id="modal-create-thread" onclick="event.stopPropagation()">
            <div class="modal-header">НОВАЯ ТЕМА</div>
            <div class="modal-body">
                <input type="text" id="th-title" placeholder="Заголовок темы">
                <textarea id="th-text" placeholder="Текст сообщения (можно ссылки на фото/видео)"></textarea>
                <button class="btn-action" onclick="UIManager.submitThread()">ОПУБЛИКОВАТЬ</button>
            </div>
        </div>
    </div>

    <!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ -->
    <script src="ui-manager.js"></script>
    <script src="auth-system.js"></script>
    <script src="profile-core.js"></script>
    <script src="engine.js"></script>
</body>
</html>
